# =====================================================================
# Redis 7 — Home profile
# =====================================================================
# Open-Jarvis uses Redis only for ephemeral data (rate-limit, MFA challenge,
# sessions). All keys carry explicit TTL.

bind 0.0.0.0
protected-mode no                  # we trust the docker network

maxmemory 256mb
maxmemory-policy volatile-lru
maxmemory-samples 10

# Persistence: AOF off (data is ephemeral), RDB snapshot every 5 min
save 300 100
appendonly no

# Logging
loglevel notice

# Limits
timeout 300
tcp-keepalive 60
