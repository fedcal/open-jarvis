name: Auto-deploy multi-environment

on:
  push:
    branches: [main, develop, staging, test]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [production, staging, test, develop]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/server

jobs:
  # ---------------- Determine target environment ----------------
  determine-env:
    name: Determine deploy target
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      url: ${{ steps.env.outputs.url }}
      tag: ${{ steps.env.outputs.tag }}
    steps:
      - name: Map branch/tag to environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "url=https://jarvis.federicocalo.dev" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "url=https://jarvis.federicocalo.dev" >> $GITHUB_OUTPUT
            echo "tag=main-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "url=https://staging.jarvis.federicocalo.dev" >> $GITHUB_OUTPUT
            echo "tag=staging-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "environment=test" >> $GITHUB_OUTPUT
            echo "url=https://test.jarvis.federicocalo.dev" >> $GITHUB_OUTPUT
            echo "tag=test-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=develop" >> $GITHUB_OUTPUT
            echo "url=https://dev.jarvis.federicocalo.dev" >> $GITHUB_OUTPUT
            echo "tag=develop-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          fi

  # ---------------- Build & push container image ----------------
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: determine-env
    timeout-minutes: 20
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=${{ needs.determine-env.outputs.environment }}-latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  # ---------------- Security scan image ----------------
  scan:
    name: Vulnerability scan (Grype)
    runs-on: ubuntu-latest
    needs: [determine-env, build]
    timeout-minutes: 10
    steps:
      - name: Run Grype scan
        uses: anchore/scan-action@v4
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-env.outputs.environment }}-latest
          fail-build: ${{ needs.determine-env.outputs.environment == 'production' }}
          severity-cutoff: high

  # ---------------- Deploy ----------------
  deploy:
    name: Deploy to ${{ needs.determine-env.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [determine-env, build, scan]
    timeout-minutes: 15
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
      url: ${{ needs.determine-env.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || 2222 }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -p ${{ secrets.SSH_PORT || 2222 }} jarvis@${{ secrets.DEPLOY_HOST }} <<'EOF'
            set -euo pipefail
            cd /opt/open-jarvis
            git fetch --all
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            export DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-env.outputs.environment }}-latest
            docker compose pull server
            docker compose up -d --no-deps server
            docker compose exec -T server jarvis db migrate || true
            sleep 10
            curl -fsS http://localhost:8080/health || exit 1
          EOF

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployed to ${{ needs.determine-env.outputs.environment }}"
          echo "URL: ${{ needs.determine-env.outputs.url }}"
          echo "Tag: ${{ needs.determine-env.outputs.tag }}"

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -p ${{ secrets.SSH_PORT || 2222 }} jarvis@${{ secrets.DEPLOY_HOST }} <<'EOF'
            cd /opt/open-jarvis
            docker compose rollback server || docker compose up -d --no-deps server
          EOF

  # ---------------- Production-only: GitHub Release ----------------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [determine-env, deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-on-empty: false
          skip-version-file: true
          skip-commit: true
          output-file: false

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Open-Jarvis ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ---------------- PR preview environment ----------------
  pr-preview:
    name: PR preview deploy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Deploy preview
        run: |
          # Logica per spawn ambiente effimero per PR
          # Esempio: kubectl apply con namespace pr-${{ github.event.number }}
          echo "Preview at https://pr-${{ github.event.number }}.jarvis.federicocalo.dev"
