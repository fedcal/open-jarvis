# ============================================================
# Jarvis — local development stack
# Stack di sviluppo locale per Jarvis
# ============================================================
# Avvio · Start:    docker compose up -d
# Stop:             docker compose down
# Reset volumi:     docker compose down -v
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis}
      POSTGRES_DB: ${POSTGRES_DB:-jarvis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarvis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]   # Qdrant exposes health via REST
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: jarvis-server:dev
    container_name: jarvis-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      JARVIS_ENVIRONMENT: ${JARVIS_ENVIRONMENT:-development}
      JARVIS_LOG_LEVEL: ${JARVIS_LOG_LEVEL:-info}
      JARVIS_SERVER_HOST: 0.0.0.0
      JARVIS_SERVER_PORT: 8080
      JARVIS_SERVER_SECRET_KEY: ${SERVER_SECRET_KEY:-change-me-in-production-please-rotate-this-value}
      JARVIS_PUBLIC_URL: ${JARVIS_PUBLIC_URL:-http://localhost:8080}
      JARVIS_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-jarvis}@postgres:5432/${POSTGRES_DB:-jarvis}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:

networks:
  default:
    name: jarvis-network
