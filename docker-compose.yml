# ============================================================
# Jarvis — local development stack
# Stack di sviluppo locale per Jarvis
# ============================================================
# Avvio · Start:    docker compose up -d
# Stop:             docker compose down
# Reset volumi:     docker compose down -v
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis}
      POSTGRES_DB: ${POSTGRES_DB:-jarvis}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarvis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]   # Qdrant exposes health via REST
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: jarvis-server:dev
    container_name: jarvis-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      JARVIS_ENVIRONMENT: ${JARVIS_ENVIRONMENT:-development}
      JARVIS_LOG_LEVEL: ${JARVIS_LOG_LEVEL:-info}
      JARVIS_SERVER_HOST: 0.0.0.0
      JARVIS_SERVER_PORT: 8080
      JARVIS_SERVER_SECRET_KEY: ${JARVIS_SERVER_SECRET_KEY:-change-me-in-production-please-rotate-this-value}
      JARVIS_PUBLIC_URL: ${JARVIS_PUBLIC_URL:-http://localhost:8080}
      JARVIS_ALLOWED_ORIGINS: ${JARVIS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      JARVIS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jarvis}:${POSTGRES_PASSWORD:-jarvis}@postgres:5432/${POSTGRES_DB:-jarvis}
      JARVIS_REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    # Single worker in dev: with --workers >1 each process would generate its
    # own ephemeral ES256 keypair (no shared cache), breaking JWT verification.
    # In production set JARVIS_JWT_*_KEY_PEM explicitly and bump workers.
    command: >
      sh -c "alembic upgrade head &&
             exec uvicorn jarvis_server.api.main:app --host 0.0.0.0 --port 8080 --workers 1 --proxy-headers"
    ports:
      - "${JARVIS_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:

networks:
  default:
    name: jarvis-network
