site_name: "Jarvis — Personal AI Infrastructure"
site_url: "https://fedcal.github.io/open-jarvis/"
site_description: "Open-source, self-hosted, Iron Man-style personal AI assistant living across all your devices — laptop, smartphone, smartwatch, AR glasses, VR, holographic displays and medical wearables. MIT licensed, privacy-first, multilingual."
site_author: "Federico Calò"
repo_url: "https://github.com/fedcal/open-jarvis"
repo_name: "fedcal/open-jarvis"
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: it
  custom_dir: docs/overrides
  icon:
    logo: material/robot-happy
    repo: fontawesome/brands/github
    edit: material/pencil
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Tema automatico (sistema)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Passa al tema scuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Passa al tema chiaro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - toc.follow
    - header.autohide

plugins:
  - search:
      lang:
        - it
        - en
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: it
          default: true
          name: Italiano
          build: true
          site_name: "Jarvis — Personal AI Infrastructure"
          site_description: "Assistente AI personale open-source, self-hosted, in stile Iron Man che vive su laptop, smartphone, smartwatch, occhiali AR, VR, display olografici e wearable medicali."
          nav_translations:
            Home: Home
            Getting started: Per iniziare
            "Implementation status": Stato implementazione
            "User manual": Manuale utente
            Installation: Installazione
            Configuration: Configurazione
            "Daily usage": Utilizzo quotidiano
            Troubleshooting: Risoluzione problemi
            FAQ: FAQ
            Architecture: Architettura
            Devices: Dispositivi
            Agents: Agenti
            Features: Funzionalità
            Health: Salute
            Finance: Finanza
            News: News & briefing
            Developer: Sviluppatore
            RAG: Documenti & RAG
            Maker: Maker (Blender & 3D print)
            Communication: Comunicazione
            "Cross-device": Cross-device
            Protocols: Protocolli
            Integrations: Integrazioni
            Mobile: Mobile (iOS · Android)
            Holographic: Ologrammi
            "Other systems": Altri sistemi
            Testing: Test
            Roadmap: Roadmap
            Vision: Vision & funzionalità future
            Phases: Fasi di sviluppo
            Contributing: Contribuire
        - locale: en
          name: English
          build: true
          site_name: "Jarvis — Personal AI Infrastructure"
          site_description: "Open-source, self-hosted, Iron Man-style personal AI assistant living across laptops, smartphones, smartwatches, AR glasses, VR, holographic displays and medical wearables."
          nav_translations:
            Home: Home
            "Per iniziare": Getting started
            "Stato implementazione": Implementation status
            "Manuale utente": User manual
            Installazione: Installation
            Configurazione: Configuration
            "Utilizzo quotidiano": Daily usage
            "Risoluzione problemi": Troubleshooting
            FAQ: FAQ
            Architettura: Architecture
            Dispositivi: Devices
            Agenti: Agents
            Funzionalità: Features
            Salute: Health
            Finanza: Finance
            "News & briefing": News
            Sviluppatore: Developer
            "Documenti & RAG": RAG
            "Maker (Blender & 3D print)": Maker
            Comunicazione: Communication
            Cross-device: Cross-device
            Protocolli: Protocols
            Integrazioni: Integrations
            "Mobile (iOS · Android)": Mobile
            Ologrammi: Holographic
            "Altri sistemi": Other systems
            Test: Testing
            Roadmap: Roadmap
            "Vision & funzionalità future": Vision
            "Fasi di sviluppo": Phases
            Contribuire: Contributing
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: In questa pagina
      permalink_title: Link permanente alla sezione
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  alternate:
    - name: Italiano
      link: /
      lang: it
    - name: English
      link: /en/
      lang: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fedcal/open-jarvis
      name: GitHub repository
    - icon: fontawesome/solid/globe
      link: https://federicocalo.dev
      name: federicocalo.dev
  generator: false
  status:
    new: Nuovo
    deprecated: Deprecato
  homepage: https://fedcal.github.io/open-jarvis/
  # SEO data consumed by docs/overrides/main.html
  seo:
    image: https://repository-images.githubusercontent.com/1234079791/og-default.png
    twitter: ""
    keywords:
      - personal AI
      - open source AI assistant
      - self-hosted Jarvis
      - Iron Man assistant
      - device mesh
      - AR VR holographic
      - medical wearables
      - LangGraph agents
      - RAG personale
      - smart home AI

copyright: >
  &copy; 2026 Federico Calò &mdash;
  <a href="https://federicocalo.dev" target="_blank" rel="noopener">federicocalo.dev</a>
  &middot; Released under the
  <a href="https://github.com/fedcal/open-jarvis/blob/main/LICENSE" target="_blank" rel="noopener">MIT License</a>

extra_css:
  - assets/css/custom.css

