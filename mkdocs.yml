  - Stato implementazione: status.md
  - Manuale utente:
      - user-manual/index.md
      - Installazione: user-manual/installation.md
      - "Server VPS": user-manual/install/server.md
      - "Desktop (Mac/Win/Linux)": user-manual/install/desktop.md
      - "Mobile (iOS/Android)": user-manual/install/mobile.md
      - Configurazione: user-manual/configuration.md
      - Utilizzo quotidiano: user-manual/usage.md
      - "Voce + Testo · modalità di interazione": user-manual/interaction-modes.md
      - Risoluzione problemi: user-manual/troubleshooting.md
      - FAQ: user-manual/faq.md
  - Architettura:
      - architecture/index.md
      - "Runtime core (Fase 1)": architecture/core-runtime.md
      - "Deep-dive · Identity + Memory + LLM": architecture/deep-dives/identity-memory-llm.md
      - "Deep-dive · Voice pipeline": architecture/deep-dives/voice-pipeline.md
      - "Deep-dive · Web search + RAG": architecture/deep-dives/rag-pipeline.md
      - "Deep-dive · Health + medical": architecture/deep-dives/health-pipeline.md
      - "Deep-dive · Maker": architecture/deep-dives/maker-pipeline.md
      - "Deep-dive · Smart home + protocols": architecture/deep-dives/smarthome-protocols.md
  - Sicurezza:
