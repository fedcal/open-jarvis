  - Design & UX:
      - "Mobile-first + WCAG 2.2": design/mobile-accessibility.md
  - Dispositivi:
      - devices/index.md
  - Agenti:
      - agents/index.md
  - Funzionalità:
      - Salute: features/health.md
      - Finanza: features/finance.md
      - News & briefing: features/news.md
      - Sviluppatore: features/developer.md
      - Documenti & RAG: features/rag.md
      - Maker (Blender & 3D print): features/maker.md
  - Comunicazione:
      - Cross-device: communication/cross-device.md
      - Protocolli: communication/protocols.md
  - Integrazioni:
      - Mobile (iOS · Android): integrations/mobile.md
      - Ologrammi: integrations/holographic.md
      - Altri sistemi: integrations/other-systems.md
      - "Catalog completo": integrations/catalog.md
  - Test:
      - testing/index.md
  - Roadmap:
      - "Timeline & milestone": roadmap/timeline.md
      - Fasi di sviluppo: roadmap/phases.md
      - Vision & funzionalità future: roadmap/vision.md
  - "Casi d'uso":
